name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci

  prisma-generate:
    name: Prisma generate
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate

  prisma-validate:
    name: Prisma validate
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

  migration-structure:
    name: Migration structure validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate migration directory structure
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d prisma/migrations ]; then
            echo "No prisma/migrations directory found; no migration files to validate."
            exit 0
          fi

          if [ ! -f prisma/migrations/migration_lock.toml ]; then
            echo "prisma/migrations/migration_lock.toml is required when migrations exist."
            exit 1
          fi

          found=0
          while IFS= read -r -d '' dir; do
            name="$(basename "$dir")"
            if [ "$name" = "migrations" ]; then
              continue
            fi

            found=1
            if [[ ! "$name" =~ ^[0-9]{14}_[A-Za-z0-9_]+$ ]]; then
              echo "Invalid Prisma migration directory name: $name"
              exit 1
            fi

            if [ ! -f "$dir/migration.sql" ]; then
              echo "Missing migration.sql in $dir"
              exit 1
            fi

            if [ ! -s "$dir/migration.sql" ]; then
              echo "Empty migration.sql in $dir"
              exit 1
            fi
          done < <(find prisma/migrations -mindepth 1 -maxdepth 1 -type d -print0 | sort -z)

          if [ "$found" -eq 0 ]; then
            echo "prisma/migrations exists but contains no migration directories."
          fi
      - name: Verify migration order and published checksums
        run: node scripts/check-migration-history.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check || npx prettier --check .

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run typecheck
        run: npm run typecheck

  tests:
    name: Unit and integration tests
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run unit and integration tests
        run: npm test

  rls:
    name: RLS isolation tests
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Deploy complete migration history to empty PostgreSQL
        run: |
          npx prisma migrate deploy
          npx prisma migrate status
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/staging/release-invariants.sql
          # The deprecated Calendar/Booking wrapper is intentionally rerunnable.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/sql/005_calendar_booking_rls.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f prisma/sql/005_calendar_booking_rls.sql
      - name: Run isolation assertions
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/rls/isolation.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/rls/calendar-booking-isolation.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/integration/tenant-relationship-integrity.sql

  migration-upgrade:
    name: Legacy, drift, and policy migration tests
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create isolated migration test databases
        env:
          PGURL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          for database in legacy_upgrade partial_schema drifted_schema weak_policy storage_policy; do
            psql "$PGURL" -v ON_ERROR_STOP=1 -c "create database $database"
          done
      - name: Upgrade deterministic legacy schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/legacy_upgrade
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/legacy_upgrade
        run: |
          bash scripts/ci/provision-legacy-database.sh
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/006_legacy_baseline_preflight.sql
          npx prisma migrate deploy
          npx prisma migrate status
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/staging/release-invariants.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/rls/isolation.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/rls/calendar-booking-isolation.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/integration/tenant-relationship-integrity.sql
      - name: Reject a partially provisioned schema atomically
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/partial_schema
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/partial_schema
        run: |
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/migrations/supabase-compatibility.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c 'create table public.users (id uuid primary key)'
          if npx prisma migrate deploy; then
            echo "A partial schema was unexpectedly accepted."
            exit 1
          fi
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c "do \$\$ begin if to_regclass('public.organizations') is not null then raise exception 'partial migration was not atomic'; end if; end \$\$"
      - name: Reject legacy structural drift before writes
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/drifted_schema
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/drifted_schema
        run: |
          bash scripts/ci/provision-legacy-database.sh
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c 'alter table public.organizations alter column slug drop not null'
          if psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/006_legacy_baseline_preflight.sql; then
            echo "The read-only preflight unexpectedly accepted drift."
            exit 1
          fi
          if npx prisma migrate deploy; then
            echo "The baseline unexpectedly accepted drift."
            exit 1
          fi
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c "do \$\$ begin if (select attnotnull from pg_attribute where attrelid = 'public.organizations'::regclass and attname = 'slug') then raise exception 'drift was rewritten'; end if; end \$\$"
      - name: Reject a same-name weakened tenant policy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weak_policy
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/weak_policy
        run: |
          bash scripts/ci/provision-legacy-database.sh
          alter_sql='alter policy contacts_select on public.contacts using (true)'
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c "$alter_sql"
          if npx prisma migrate deploy; then
            echo "The security baseline unexpectedly accepted a weak policy."
            exit 1
          fi
          psql "$DIRECT_URL" -Atqc "select qual from pg_policies where schemaname = 'public' and tablename = 'contacts' and policyname = 'contacts_select'" | grep -qx 'true'
      - name: Verify storage compatibility and reject weak policy drift
        env:
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/storage_policy
        run: |
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/migrations/supabase-compatibility.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/migrations/storage-fixture.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/004_storage.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/004_storage.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/staging/storage-invariants.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -c 'alter policy storage_org_read on storage.objects using (true)'
          if psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/004_storage.sql; then
            echo "Storage compatibility unexpectedly accepted a weak policy."
            exit 1
          fi
          psql "$DIRECT_URL" -Atqc "select qual from pg_policies where schemaname = 'storage' and tablename = 'objects' and policyname = 'storage_org_read'" | grep -qx 'true'

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [prisma-generate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build with placeholder env
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_PUBLIC_APP_URL: https://ci.invalid
          NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci

  production-dependency-audit:
    name: Production dependency security audit
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Blocking production dependency audit
        run: npm audit --omit=dev --audit-level=high

  full-dependency-audit-report:
    name: Full dependency audit report
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Full dependency audit report
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Save full dependency audit JSON
        continue-on-error: true
        run: npm audit --audit-level=high --json > npm-audit-full.json
      - name: Upload full audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-full-${{ github.run_id }}-${{ github.run_attempt }}
          path: npm-audit-full.json
          if-no-files-found: warn
          retention-days: 30

  i18n:
    name: i18n key parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check locale key parity
        run: node scripts/check-i18n-parity.mjs

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - install
      - prisma-generate
      - prisma-validate
      - migration-structure
      - lint
      - typecheck
      - tests
      - rls
      - migration-upgrade
      - build
      - production-dependency-audit
      - full-dependency-audit-report
      - i18n
      - secret-scan
    if: always()
    steps:
      - name: Verify required CI jobs
        shell: bash
        run: |
          set -euo pipefail
          results='${{ toJson(needs) }}'
          if ! echo "$results" | jq -e 'all(.[]; .result == "success")' > /dev/null; then
            echo "$results"
            exit 1
          fi
          echo "All required CI jobs completed successfully."
