name: Production release

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: "Exact 40-character main SHA validated on staging"
        required: true
        type: string
      confirm_production_sha:
        description: "Retype the exact candidate SHA to confirm production"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  VERCEL_CLI_VERSION: "56.3.2"

jobs:
  verify-release-chain:
    name: Verify immutable release chain
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      candidate_sha: ${{ steps.verify.outputs.candidate_sha }}
    steps:
      - name: Checkout release verifier
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify main, CI, staging, and manual confirmation
        id: verify
        run: npx tsx scripts/verify-release-chain.ts
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          CONFIRM_PRODUCTION_SHA: ${{ inputs.confirm_production_sha }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_API_URL: ${{ github.api_url }}
          RELEASE_MAIN_BRANCH: main
          RELEASE_CI_WORKFLOW: ci.yml
          RELEASE_STAGING_WORKFLOW: staging-release.yml

  migrate-and-deploy:
    name: Migrate and deploy production
    runs-on: ubuntu-latest
    needs: [verify-release-chain]
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout immutable production candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-release-chain.outputs.candidate_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify checkout SHA
        shell: bash
        run: |
          set -euo pipefail
          actual_sha=$(git rev-parse HEAD)
          if [ "$actual_sha" != "$EXPECTED_CANDIDATE_SHA" ]; then
            echo "Checked-out SHA does not match the verified production candidate."
            exit 1
          fi
        env:
          EXPECTED_CANDIDATE_SHA: ${{ needs.verify-release-chain.outputs.candidate_sha }}

      - name: Read-only legacy compatibility preflight
        run: psql "$PROD_DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/006_legacy_baseline_preflight.sql
        env:
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Apply Prisma migrations once
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Verify migration status
        run: npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Apply rerunnable Supabase Storage compatibility
        run: psql "$PROD_DIRECT_URL" -v ON_ERROR_STOP=1 -f prisma/sql/004_storage.sql
        env:
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Verify production database invariants
        run: |
          psql "$PROD_DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/staging/release-invariants.sql
          psql "$PROD_DIRECT_URL" -v ON_ERROR_STOP=1 -f tests/staging/storage-invariants.sql
        env:
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Build immutable production deployment
        run: |
          npx --yes "vercel@$VERCEL_CLI_VERSION" pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes "vercel@$VERCEL_CLI_VERSION" build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy immutable production build
        run: npx --yes "vercel@$VERCEL_CLI_VERSION" deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post-deploy synthetic check
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            code=$(curl --silent --output /dev/null --write-out "%{http_code}" "$PROD_URL/api/health")
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Production health check failed."
          exit 1
        env:
          PROD_URL: ${{ vars.PROD_URL }}
