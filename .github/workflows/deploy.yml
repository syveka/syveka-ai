name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  verify-ci:
    name: Verify CI success for deployment commit
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_sha: ${{ steps.verify.outputs.deploy_sha }}
    steps:
      - name: Verify workflow_run payload
        id: verify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI workflow conclusion was not success."
            exit 1
          fi

          if [ "${{ github.event.workflow_run.event }}" != "push" ]; then
            echo "Deployment is only allowed from CI runs triggered by push."
            exit 1
          fi

          if [ "${{ github.event.workflow_run.head_branch }}" != "main" ]; then
            echo "Deployment is only allowed from the main branch."
            exit 1
          fi

          if [ -z "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Missing deployment commit SHA."
            exit 1
          fi

          echo "deploy_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

  e2e-staging:
    name: E2E on staging
    runs-on: ubuntu-latest
    needs: [verify-ci]
    environment: staging
    steps:
      - name: Checkout deployment commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-ci.outputs.deploy_sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite against staging
        run: npm run test:e2e
        env:
          E2E_BASE_URL: ${{ vars.STAGING_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

  migrate-and-deploy:
    name: Migrate DB and deploy production
    runs-on: ubuntu-latest
    needs: [verify-ci, e2e-staging]
    environment: production
    steps:
      - name: Checkout deployment commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-ci.outputs.deploy_sha }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma migrate deploy
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Post-deploy synthetic check
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_URL }}/api/health")
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check failed" && exit 1
